<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع أحمد - النسخة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #1a0a2e;
            --accent-yellow: #ffcc00;
            --team-l: #a855f7;
            --team-r: #4ade80;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--primary-purple);
            background-image: radial-gradient(circle, rgba(255,204,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; margin: 0; overflow: hidden; height: 100vh;
        }

        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; }
        .active { display: flex; }

        /* اللوحة العلوية */
        .header-ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 50px; border: 2px solid var(--accent-yellow); font-size: 1.5rem; font-weight: 900; }
        
        .status-msg { background: var(--accent-yellow); color: black; padding: 5px 20px; border-radius: 10px; font-weight: bold; margin-top: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        /* الشبكة */
        .grid-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; max-width: 850px; padding: 20px; }
        .hexagon { 
            aspect-ratio: 1/1.1; width: 80px; background: white; color: var(--primary-purple); 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; 
            transition: 0.3s; opacity: 0.5; cursor: not-allowed;
        }
        .selectable { opacity: 1; cursor: pointer !important; transform: scale(1.05); box-shadow: 0 0 20px var(--accent-yellow); border: 2px solid gold; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* نافذة السؤال */
        #q-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .q-card { width: 90%; max-width: 600px; background: #3d1d6d; border: 5px solid var(--accent-yellow); border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        input { width: 80%; padding: 15px; border-radius: 15px; border: none; font-size: 1.2rem; margin: 20px 0; text-align: center; font-family: 'Cairo'; }
        .btn { background: var(--accent-yellow); color: black; border: none; padding: 12px 30px; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1 style="font-size: 4rem; text-shadow: 0 10px 20px black;">حروف مع أحمد 🏆</h1>
        <button class="btn" onclick="startGame()">إبدأ المسابقة الآن</button>
    </div>

    <div id="grid-screen" class="screen">
        <div class="header-ui">
            <div class="score-box" style="color:var(--team-l)"><span id="n-l">الفريق 1</span>: <span id="s-l">0</span></div>
            <div id="turn-display" class="status-msg">انتظر السؤال التلقائي...</div>
            <div class="score-box" style="color:var(--team-r)"><span id="n-r">الفريق 2</span>: <span id="s-r">0</span></div>
        </div>
        
        <div class="grid-container" id="main-grid"></div>
    </div>

    <div id="q-overlay">
        <div class="q-card">
            <div id="timer" style="font-size: 3rem; color: red; font-weight: 900;">30</div>
            <h2 id="q-title" style="color: var(--accent-yellow);"></h2>
            <p id="q-desc" style="font-size: 1.5rem;"></p>
            <input type="text" id="ans-input" placeholder="اكتب الإجابة هنا...">
            <br>
            <button class="btn" onclick="submitAnswer()">إرسال الإجابة</button>
            <p id="wrong-msg" style="color: #ff4d4d; display:none; margin-top:10px;">إجابة خاطئة! حاول مرة أخرى</p>
        </div>
    </div>

    <script>
        const bank = {
            "أ": ["أول الخلفاء الراشدين ومن العشرة المبشرين بالجنة؟", "أبو بكر الصديق"],
            "ب": ["ما هي عاصمة العراق؟", "بغداد"],
            "ت": ["ما هي السورة التي تسمى 'سورة الفرائض'؟", "النساء"],
            "ث": ["ما هو الشيء الذي لا يبرد أبداً حتى لو وضعناه في الثلاجة؟", "ثوم"],
            "ج": ["أكبر قارة في العالم من حيث المساحة والسكان؟", "آسيا"],
            "ح": ["من هو النبي الملقب بـ 'ذو النون'؟", "يونس"],
            "خ": ["من هو القائد المسلم الذي لم يهزم في أي معركة؟", "خالد بن الوليد"],
            "د": ["دولة عربية عاصمتها الدوحة؟", "قطر"],
            "ذ": ["ما هو الشيء الذي له أسنان ولا يعض؟", "ذو أسنان (مشط)"],
            "ر": ["ما هو الركن الرابع من أركان الإسلام؟", "رمضان"],
            "ز": ["ما هو المعدن السائل الذي يستخدم في موازين الحرارة؟", "زئبق"],
            "س": ["ما هو الاسم الذي يطلق على البحر المتوسط قديماً؟", "سحر"],
            "ش": ["من هو الشاعر الذي قتله شعره؟", "المتنبي"],
            "ص": ["ما هي الصلاة التي ليس لها ركوع ولا سجود؟", "صلاة الجنازة"],
            "ض": ["ما هو اللقب الذي يطلق على اللغة العربية؟", "ضاد"],
            "ط": ["ما هو أكبر طائر في العالم؟", "نعامة"],
            "ظ": ["ما هو الشيء الذي يتبعك أينما ذهبت في النهار؟", "ظل"],
            "ع": ["من هو الخليفة الذي لقب بـ 'الفاروق'؟", "عمر بن الخطاب"],
            "غ": ["ما هو الاسم الذي يطلق على صغير الغزال؟", "غزال"],
            "ف": ["أول سورة في ترتيب المصحف الشريف؟", "فاتحة"],
            "ق": ["أين توجد أكبر نسبة من المياه العذبة؟", "قطب"],
            "ك": ["ما هو أضخم حيوان يعيش على الأرض؟", "كبير (الحوت الأزرق)"],
            "ل": ["ما هي اللغة الرسمية في البرازيل؟", "لغة برتغالية"],
            "م": ["ما هي عاصمة المملكة العربية السعودية؟", "رياض"],
            "ن": ["ما هو المعدن الذي ينجذب للمغناطيس؟", "نيكل"],
            "ه": ["ما هو الاسم العلمي لمرض فقدان الذاكرة؟", "هذيان"],
            "و": ["ما هو أطول نهر في العالم؟", "نيل"],
            "ي": ["ما هي العملة الرسمية لليابان؟", "ين"]
        };

        let scores = { left: 0, right: 0 };
        let canSelectLetter = false;
        let winnerOfLastRound = null;
        let activeLetter = null;
        let timer;

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('grid-screen').classList.add('active');
            renderGrid();
            // بدء سؤال تلقائي فوراً عند الدخول
            setTimeout(triggerRandomQuestion, 1000);
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split("").forEach(l => {
                const hex = document.createElement('div');
                hex.className = 'hexagon';
                hex.id = 'hex-' + l;
                hex.innerText = l;
                hex.onclick = () => selectLetter(l);
                grid.appendChild(hex);
            });
        }

        function triggerRandomQuestion() {
            const letters = Object.keys(bank);
            const rand = letters[Math.floor(Math.random() * letters.length)];
            showQuestion(rand, true); // true تعني سؤال افتتاح
        }

        function showQuestion(l, isOpening = false) {
            activeLetter = l;
            const data = bank[l];
            document.getElementById('q-title').innerText = "سؤال حرف: " + l;
            document.getElementById('q-desc').innerText = data[0];
            document.getElementById('ans-input').value = "";
            document.getElementById('q-overlay').style.display = 'flex';
            document.getElementById('wrong-msg').style.display = 'none';
            
            let s = 30;
            document.getElementById('timer').innerText = s;
            clearInterval(timer);
            timer = setInterval(() => {
                s--;
                document.getElementById('timer').innerText = s;
                if(s <= 0) { clearInterval(timer); alert("انتهى الوقت!"); document.getElementById('q-overlay').style.display = 'none'; triggerRandomQuestion(); }
            }, 1000);
        }

        function submitAnswer() {
            const input = document.getElementById('ans-input').value.trim();
            const correct = bank[activeLetter][1];
            
            if(input !== "" && (input.includes(correct) || correct.includes(input))) {
                clearInterval(timer);
                document.getElementById('q-overlay').style.display = 'none';
                
                // تحديد من جاوب (في البث، المطور يختار الفريق يدوياً أو نعتمد نظام الأسرع)
                const side = confirm("هل الفريق الأيسر هو من أجاب؟") ? 'left' : 'right';
                scores[side] += 10;
                updateUI();
                
                // تفعيل وضع اختيار الحرف للفائز
                winnerOfLastRound = side;
                enableLetterSelection();
            } else {
                document.getElementById('wrong-msg').style.display = 'block';
            }
        }

        function enableLetterSelection() {
            canSelectLetter = true;
            document.getElementById('turn-display').innerText = `مبروك! على فريق ${winnerOfLastRound === 'left' ? 'اليسار' : 'اليمين'} اختيار الحرف القادم`;
            document.querySelectorAll('.hexagon').forEach(h => {
                if(!h.style.background) h.classList.add('selectable');
            });
        }

        function selectLetter(l) {
            if(!canSelectLetter) return;
            
            // تلوين الحرف فوراً بلون الفريق الفائز بالسؤال السابق
            const hex = document.getElementById('hex-' + l);
            hex.style.background = winnerOfLastRound === 'left' ? '#a855f7' : '#4ade80';
            hex.style.color = "white";
            hex.classList.remove('selectable');
            
            canSelectLetter = false;
            document.querySelectorAll('.hexagon').forEach(h => h.classList.remove('selectable'));
            
            // إظهار سؤال الحرف الذي تم اختياره
            setTimeout(() => showQuestion(l), 500);
        }

        function updateUI() {
            document.getElementById('s-l').innerText = scores.left;
            document.getElementById('s-r').innerText = scores.right;
        }
    </script>
</body>
</html>
